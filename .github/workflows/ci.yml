# H.120 CI/CD — GitHub Actions port of the GitLab pipeline.
#
# Two flows:
#   * test    -> every push to `main` and every SemVer tag vX.Y.Z
#   * release -> only on a strict SemVer tag vX.Y.Z (build + GitHub release)
#
# Note: the crate's default `player` feature pulls in gtk4/libadwaita, which
# need system GTK4 dev libraries we don't install here. The whole pipeline
# therefore builds with `--no-default-features`, and releases ship only the
# headless CLI binary `h120` (not the graphical `h120-play`).

name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# Needed by the release job to create a GitHub release and upload assets.
permissions:
  contents: write

env:
  BINARY_NAME: h120

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain versions
        run: |
          rustc --version
          cargo --version
      - run: cargo build --no-default-features --locked
      - run: cargo test --no-default-features --locked

  build:
    name: Build linux-x64
    runs-on: ubuntu-latest
    # Only on a SemVer tag.
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      asset_name: ${{ steps.package.outputs.asset_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain versions
        run: |
          rustc --version
          cargo --version
      - name: Build release binary
        run: cargo build --release --locked --no-default-features --bin "${BINARY_NAME}"
      - name: Package binary
        id: package
        run: |
          ASSET_NAME="${BINARY_NAME}-${GITHUB_REF_NAME}-linux-x64"
          mkdir -p dist
          cp "target/release/${BINARY_NAME}" "dist/${ASSET_NAME}"
          strip "dist/${ASSET_NAME}"
          ls -lh "dist/${ASSET_NAME}"
          echo "asset_name=${ASSET_NAME}" >> "$GITHUB_OUTPUT"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.asset_name }}
          path: dist/${{ steps.package.outputs.asset_name }}
          retention-days: 7

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.asset_name }}
          path: dist
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          ASSET_NAME: ${{ needs.build.outputs.asset_name }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "dist/${ASSET_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Release ${GITHUB_REF_NAME}" \
            --notes "Automatic build of tag ${GITHUB_REF_NAME} for Linux x64 (headless h120 CLI)."
